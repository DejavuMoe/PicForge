name: Bug report
description: Report a reproducible PicForge problem.
title: '[Bug]: '
labels: ['bug']
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include browser, operating system, file type, and relevant settings.
      placeholder: |
        1. Open PicForge
        2. Add ...
        3. Change ...
        4. See ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser and OS
      placeholder: Chrome 126 on macOS 15
  - type: textarea
    id: notes
    attributes:
      label: Additional context
      description: Do not attach private images unless they are safe to share publicly.
