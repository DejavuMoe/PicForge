name: Feature request
description: Suggest an improvement for PicForge.
title: '[Feature]: '
labels: ['enhancement']
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or workflow
      description: What user workflow would this improve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the expected behavior or UI.
    validations:
      required: true
  - type: textarea
    id: constraints
    attributes:
      label: Constraints
      description: PicForge processes images locally; note any privacy, browser, or performance concerns.
